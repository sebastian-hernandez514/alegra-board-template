# CEO Highlights & Lowlights — Q1 2026 (Enero, Febrero, Marzo)

ceo_title: "CEO Highlights & Lowlights"

highlights:
  - "Q1 campaign performance improved across the full funnel with lower investment than Q4 and Q1 2025. PQLs grew 60% and registration-to-completed-onboarding conversion rose from 50% to 72%, driving growth in New Logos and New MRR and reinforcing the efficiency of the current growth strategy."
  - "AI adoption across the Growth team is delivering measurable productivity gains, with 67 hours saved per week per team through AI agents. This capacity has enabled content scaling, broader market coverage (including Panama), and is informing a more aggressive growth strategy."
  - "AI implementation in CE now handles ~7% of total demand, reducing manual workload and increasing operational efficiency."
  - "Both Accountants and SMB delivered strong Q1 results, with Accountants crossing the $20K MRR milestone for the first time and SMB reaching $33K (+32% vs. January). Individual attainment above 100% in Accountants reached 47.62% (10/21) by March, while SMB logo conversion improved from 80% to 89% — both teams closed the quarter above target."
  - "Alanube crossed the $80K MRR milestone, adding $10K over the prior month — driven by the continued momentum of the Full-Cycle Partner Success program. Document processing set a new record at 26 million, reinforcing the platform's scalability trajectory."
  - "PODs launched to strengthen the accountant experience, improving team specialization and service quality across CE."
  - "Launched in Mexico the new Just Invoicing plan, successfully transforming the invitation model. Weekly invites tripled from 15 to 45, and ongoing process optimizations are underway to further accelerate this volume."
  - "Alegra MCP is nearly ready to go live for clients, giving them access to more than 48 tools across invoicing, contacts, banks, and taxes. This integration enables AI agents to interact directly with the platform, unlocking a significant new layer of automation for both accountants and SMBs."

lowlights:
  - "Churn remained elevated in Q1, in line with seasonal patterns. Root cause analysis is underway to identify key drivers; targeted retention actions are expected to follow."
  - "MQL volume in the Dominican Republic fell short of projections despite the mandatory e-invoicing regulation. The period closed at 36% of projected MQLs — though conversion quality was strong enough to meet the New MRR target and come close to the New Logos goal."
  - "Sales attainment across Accountants and SMB segments remains below target. In Accountants, 35%+ of the team closed Q1 below 80% of individual quota; in SMB, only 21% reached or exceeded 100% — both pointing to shared gaps in commercial enablement and performance consistency."
  - "Average usage per account is improving but still well below the 100K monthly document target. The metric climbed from 13K in January to 42K in March, driven by the migration toward larger enterprise accounts — closing the remaining gap remains a key condition for the high-volume acquisition strategy."

