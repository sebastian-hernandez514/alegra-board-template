# CEO Highlights & Lowlights — Q1 2026 (Enero, Febrero, Marzo)

ceo_title: "CEO Highlights & Lowlights"

highlights:
  - "We've had one of the best quarters in recent times — the trend across our key metrics (except churn) is positive and has held steady month over month."
  - "Q1 campaign performance improved across the full funnel with lower investment than Q4 and Q1 2025. PQLs grew 60% and registration-to-completed-onboarding conversion rose from 50% to 72%, driving growth in New Logos and New MRR and reinforcing the efficiency of the current growth strategy."
  - "AI adoption across the Growth team is delivering measurable productivity gains, with 67 hours saved per week per team through AI agents."
  - "AI implementation in CE now handles ~7% of total demand, reducing manual workload and increasing operational efficiency."
  - "Both Accountants and SMB delivered strong Q1 results, with Accountants crossing the $20K MRR milestone for the first time and SMB reaching $33K (+32% vs. January). Individual attainment above 100% in Accountants reached 47.62% (10/21) by March, while SMB logo conversion improved from 80% to 89% — both teams closed the quarter above target."
  - "Alanube crossed the $80K MRR milestone, adding $10K over the prior month."
  - "PODs launched to strengthen the accountant experience, improving team specialization and service quality across CE."
  - "Launched in Mexico the new Just Invoicing plan, successfully transforming the invitation model. Weekly invites tripled from 15 to 45, and ongoing process optimizations are underway to further accelerate this volume."
  - "Alegra and Alanube MCP is nearly ready to go live for clients."

lowlights:
  - "Churn remained elevated in Q1, in line with seasonal patterns. Root cause analysis is underway to identify key drivers; targeted retention actions are expected to follow."
  - "We're still not seeing the expected growth in Mexico, and even though we keep testing, we still don't have a clear path to growing with accountants."

financial_update: "Q1 was a highly successful quarter for us, marked by accelerating top line growth and a major inflection point in profitability. We closed the quarter with $6.9M in revenue (up 32% YoY) and crushed our EBITDA targets, delivering a positive $710k (10.3% margin) compared to a planned loss. This momentum is driven by robust subscription inflows and remarkable operational leverage; we successfully grew revenues while decreasing our OpEx by 1% YoY, drastically improving our S&M efficiency. Consequently, our cash position is exceptionally healthy, ending at $4.1M nearly double our forecast. Cash burn dropped to a historical low of $126k for the quarter, securing our runway. We are entering Q2 with a pristine balance sheet and a clear, proven path to sustained, profitable growth."

